name: Frontend CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    name: TypeScript + Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Vite production build
        run: npm run build
        env:
          VITE_USE_MOCKS: 'false'
          VITE_API_URL: ''
          VITE_ENV: 'production'

  docker-build:
    name: Docker image build + nginx validate
    runs-on: ubuntu-latest
    needs: typecheck-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          push: false
          tags: billing-frontend:ci
          build-args: |
            VITE_USE_MOCKS=false
            VITE_API_URL=
            VITE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate nginx config
        run: |
          docker run --rm \
            -e BACKENDURL=http://localhost:8080 \
            --entrypoint /bin/sh \
            billing-frontend:ci \
            -c "envsubst '\$BACKENDURL' < /etc/nginx/conf.d/default.conf > /tmp/default.conf && nginx -t -c /tmp/default.conf 2>&1"
