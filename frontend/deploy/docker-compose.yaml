version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: go-backend
    extra_hosts:
      - "firebird-server:${FB_HOST}"
    environment:
      - FB_HOST=firebird-server
      - FB_USER=${FB_USER}
      - FB_PASSWORD=${FB_PASSWORD}
      - FB_NAME=${FB_NAME}
      - FB_PORT=${FB_PORT}
      - CONFIG_PATH=app/config/docker.yaml
      - ACCESS_SECRET=${BILLING_ACCESS_SECRET}
      - REFRESH_SECRET=${BILLING_REFRESH_SECRET}
    ports:
      - "8080:8080"
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_USE_MOCKS: ${VITE_USE_MOCKS:-false}
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_ENV: ${VITE_ENV:-production}
    container_name: billing-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  app-net:
    driver: bridge