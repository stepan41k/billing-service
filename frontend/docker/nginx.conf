# Nginx читает $BACKEND_URL из env (подставляется через envsubst в entrypoint)
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml;

  # ── API proxy → бэкенд ────────────────────────────────────────────────────
  # $BACKEND_URL берётся из переменной окружения (см. docker-compose.yml)

  location = /api/auth/login {
    proxy_pass         ${BACKEND_URL}/login;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   Content-Type      $content_type;
  }

  location = /api/auth/register {
    proxy_pass         ${BACKEND_URL}/profile;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
  }

  location ~ ^/api/profile(/.*)?$ {
    proxy_pass         ${BACKEND_URL}/profile$1$is_args$args;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   Authorization     $http_authorization;
  }

  # Остальные /api/* — заглушка
  location /api/ {
    default_type application/json;
    return 501 '{"error":"endpoint not implemented yet"}';
  }

  # ── SPA ───────────────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
