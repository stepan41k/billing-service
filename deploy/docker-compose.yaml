version: '3.8'

services:
  backend:
    build:
      context: ../backend/
      dockerfile: Dockerfile
    container_name: go_backend
    # restart: always
    extra_hosts:
      - "firebird-server:${DB_HOST}"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - DB_URL=firebird-server

      - CONFIG_FILE=/app/config/local.yaml
      - MIGRATIONS_PATH=app/migrations

      - DATABASE_URL=SYSDBA:sysdba@192.168.1.22:3050/C:/Data/maximadb.fdb

      - ACCESS_SECRET=технолоджи1
      - REFRESH_SECRET=технолоджи2
    # depends_on:
    #   migrator:
    #     condition: service_completed_successfully
    ports:
      - "8080:8080"

  #frontend:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    # restart: always
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      - backend

