version: '3.8'

services:
  backend:
    build:
      context: ../backend/
      dockerfile: Dockerfile
    container_name: go_backend
    # restart: always
    # network_mode: "host"
    extra_hosts:
      - "firebird-server:${FB_HOST}"
    environment:
      # Settings for FireBird databas
      - FB_HOST=firebird-server
      - FB_USER=${FB_USER}
      - FB_PASSWORD=${FB_PASSWORD}
      - FB_NAME=${FB_NAME}
      - FB_PORT=${FB_PORT}
      # Settings for the application
      - CONFIG_FILE=/app/config/docker.yaml
      - ACCESS_SECRET=${BILLING_ACCESS_SECRET}
      - REFRESH_SECRET=${BILLING_REFRESH_SECRET}
    ports:
      - "8080:8080"

  #frontend:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    # restart: always
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      - backend

